<svg viewBox="0 0 115 25" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">

<style>

svg {
  width:100vw;
  position:fixed;
  top:-5px;
  transform: rotate(180deg);
  overflow:visible;
}

/* Waves */
.wave {
  animation: wave 4s linear infinite;
  fill: #00ADB5;  
}
#wave2 { animation-duration:6s; opacity:.6 }
#wave3 { animation-duration:8s; opacity:.3 }

/* Neural drops */
.node {
  fill: #00ADB5;
  animation: pulse 2s infinite;
  transform-origin: center;
}
.node:nth-child(2) { animation-delay: .5s }
.node:nth-child(3) { animation-delay: 1s }

/* Animations */
@keyframes wave {
  to {transform: translateX(-100%);}
}

@keyframes pulse {
  0%,100% { r: 2 }
  50% { r: 4 }
}

@keyframes typing {
  from { width: 0 }
  to { width: 100% }
}

</style>

<defs> 
  <path id="wave" d="M 0,10 C 30,10 30,15 60,15 90,15 90,10 120,10 v 28 h -120 z" />
</defs> 

<!-- Waves -->
<use id="wave3" class="wave" xlink:href="#wave" x="0" y="-2"></use> 
<use id="wave2" class="wave" xlink:href="#wave" x="0" y="0"></use>
<use id="wave1" class="wave" xlink:href="#wave" x="0" y="1"></use>

<!-- Neural Network -->
<g>
  <circle class="node" cx="30" cy="8" r="2"/>
  <circle class="node" cx="50" cy="5" r="2"/>
  <circle class="node" cx="70" cy="9" r="2"/>
  
  <line x1="30" y1="8" x2="50" y2="5" stroke="#EEEEEE" stroke-width="0.3"/>
  <line x1="50" y1="5" x2="70" y2="9" stroke="#EEEEEE" stroke-width="0.3"/>
</g>

<!-- Name typing -->
<path id="nameTyping">
  <animate attributeName="d" from="m25,-6 h0" to="m25,-6 h70" dur="4s" fill="freeze"/>
</path>

<text font-family="Courier New" font-size=".22em" fill="white"
      font-weight="bold" letter-spacing="1.5">
  <textPath xlink:href="#nameTyping">
      Youssef Gamal
  </textPath>
</text>

<!-- Title typing -->
<path id="descTyping">
  <animate attributeName="d" from="m27,-3 h0" to="m27,-3 h70" dur="5s" fill="freeze"/>
</path>

<text font-family="Helvetica" font-size=".12em" fill="white"> 
  <textPath xlink:href="#descTyping">
      Machine Learning Engineer | Python | Data Analysis | ML Models
  </textPath>
</text>

</svg>
