<svg width="900" height="250" viewBox="0 0 900 250" xmlns="http://www.w3.org/2000/svg">

<!-- Background -->
<rect width="900" height="250" fill="#19c7a2"/>

<!-- Card -->
<rect x="40" y="40" width="820" height="170" rx="15" fill="#000"/>

<!-- Floating squares group -->
<g>

  <!-- LEFT SIDE -->
  <rect x="100" y="80" width="20" height="20" fill="#19c7a2">
    <animate attributeName="y" values="80;70;80" dur="2s" repeatCount="indefinite"/>
  </rect>

  <rect x="130" y="110" width="20" height="20" fill="#19c7a2">
    <animate attributeName="y" values="110;100;110" dur="2.5s" repeatCount="indefinite"/>
  </rect>

  <rect x="160" y="90" width="20" height="20" fill="#19c7a2">
    <animate attributeName="y" values="90;80;90" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- RIGHT SIDE -->
  <rect x="700" y="80" width="20" height="20" fill="#19c7a2">
    <animate attributeName="y" values="80;70;80" dur="2.2s" repeatCount="indefinite"/>
  </rect>

  <rect x="730" y="110" width="20" height="20" fill="#19c7a2">
    <animate attributeName="y" values="110;100;110" dur="2.8s" repeatCount="indefinite"/>
  </rect>

  <rect x="760" y="90" width="20" height="20" fill="#19c7a2">
    <animate attributeName="y" values="90;85;90" dur="3.2s" repeatCount="indefinite"/>
  </rect>

</g>

<!-- Animated lines (draw effect) -->
<line x1="300" y1="80" x2="600" y2="80" stroke="#19c7a2" stroke-width="2"
      stroke-dasharray="300" stroke-dashoffset="300">
  <animate attributeName="stroke-dashoffset" from="300" to="0" dur="2s" fill="freeze"/>
</line>

<line x1="300" y1="170" x2="600" y2="170" stroke="#19c7a2" stroke-width="2"
      stroke-dasharray="300" stroke-dashoffset="300">
  <animate attributeName="stroke-dashoffset" from="300" to="0" dur="2.5s" fill="freeze"/>
</line>

<!-- Title -->
<text x="450" y="110" text-anchor="middle" fill="#ffffff" font-size="30">
  Build your
  <animate attributeName="opacity" from="0" to="1" dur="1.5s" fill="freeze"/>
</text>

<!-- Main highlight text -->
<text x="450" y="150" text-anchor="middle" fill="#19c7a2" font-size="36" font-weight="600">
  Machine Learning Career.
  <animate attributeName="opacity" from="0" to="1" dur="2s" fill="freeze"/>
</text>

<!-- Contact info fade-in -->
<text x="120" y="190" fill="#ffffff" font-size="14">
  📞 +201093569285
  <animate attributeName="opacity" from="0" to="1" dur="2.2s" fill="freeze"/>
</text>

<text x="350" y="190" fill="#ffffff" font-size="14">
  ✉ youssefgamalmowafy@gmail.com
  <animate attributeName="opacity" from="0" to="1" dur="2.4s" fill="freeze"/>
</text>

<text x="580" y="190" fill="#ffffff" font-size="14">
  🌐 linkedin.com/in/youssef-gamal-510030402
  <animate attributeName="opacity" from="0" to="1" dur="2.6s" fill="freeze"/>
</text>

</svg>
